# Zabbix Server + Web + PostgreSQL on the Monitoring cluster (kind-monitoring).
# No Zabbix Agent here — agents run on the Server cluster (get-cookin); see values-getcookin-zabbix-agent.template.yaml
#
# Install order: apply this release first, then the agent release on the Server Mac.
# Chart: https://github.com/zabbix-community/helm-zabbix — see k8s/zabbix/README.md

zabbixImageTag: ubuntu-7.0.16

postgresql:
  enabled: true
  persistence:
    enabled: true
    storageSize: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

zabbixServer:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
  # Agents on the Server Mac reach the server over Tailscale using NodePort (standard port 10051 is inside the cluster).
  service:
    type: NodePort
    port: 10051
    nodePort: 31051

zabbixProxy:
  enabled: false

zabbixAgent:
  enabled: false

zabbixWeb:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
