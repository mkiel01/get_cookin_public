# Routes node-exporter + kube-state-metrics through ingress-nginx on :80.
#
# spec.rules[].host cannot be an IP address (Kubernetes validation). This Ingress uses one
# rule with no `host` so any Host header matches (127.0.0.1, localhost, Tailscale IP, etc.).
#
# Paths (Prometheus metrics_path):
#   /internal/prometheus/node-exporter/metrics
#   /internal/prometheus/kube-state-metrics/metrics
#
# Optional: nginx.ingress.kubernetes.io/whitelist-source-range: "<MONITORING_TAILSCALE_IP>/32"
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: getcookin-remote-metrics
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /internal/prometheus/node-exporter(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-node-exporter-prometheus-node-exporter
                port:
                  number: 9100
          - path: /internal/prometheus/kube-state-metrics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-kube-state-metrics
                port:
                  number: 8080
