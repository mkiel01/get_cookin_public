{{- $secret := include "get-cookin.secretName" . }}
apiVersion: v1
kind: Service
metadata:
  name: recipes-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: recipes-service
    app.kubernetes.io/component: api
    {{- include "get-cookin.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: recipes-service
    app.kubernetes.io/part-of: get-cookin
  ports:
    - name: http
      port: 4000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipes-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: recipes-service
    app.kubernetes.io/component: api
    {{- include "get-cookin.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recipes-service
      app.kubernetes.io/part-of: get-cookin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recipes-service
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: get-cookin
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: recipes-service
          image: "{{ .Values.recipesService.image.repository }}:{{ .Values.recipesService.image.tag }}"
          imagePullPolicy: {{ .Values.recipesService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: JWT_SECRET
            - name: CORS_ORIGINS
              value: {{ .Values.recipesService.corsOrigins | quote }}
            - name: JWT_COOKIE_SECURE
              value: {{ .Values.recipesService.jwtCookieSecure | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.recipesService.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.recipesService.logFormat | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.recipesService.rateLimitMax | quote }}
            - name: RATE_LIMIT_AUTH_MAX
              value: {{ .Values.recipesService.rateLimitAuthMax | quote }}
            - name: MINIO_ENDPOINT
              value: "minio"
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_USE_SSL
              value: "false"
            - name: MINIO_BUCKET
              value: "recipe-images"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: MINIO_ROOT_PASSWORD
            - name: PUBLIC_APP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: PUBLIC_APP_URL
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_FROM
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_PORT
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_SECURE
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: SMTP_PASS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.recipesService.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
