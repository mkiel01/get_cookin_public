# Repo-managed Postgres 16 settings (Kubernetes + Docker Compose).
# Loaded via: postgres -c config_file=/etc/postgresql/postgresql.conf
# Tune shared_buffers / effective_cache_size if you change container memory limits.

data_directory = '/var/lib/postgresql/data'
hba_file = '/etc/postgresql/pg_hba.conf'
listen_addresses = '*'
port = 5432
unix_socket_directories = '/var/run/postgresql'

max_connections = 100
superuser_reserved_connections = 3

# ~12–25% of container RAM; keep below cgroup limit (see values.yaml postgres.resources)
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB

checkpoint_completion_target = 0.9
wal_buffers = 16MB
min_wal_size = 80MB
max_wal_size = 1GB

default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200

timezone = 'UTC'
log_timezone = 'UTC'
log_line_prefix = '%m [%p] '
log_connections = off
log_disconnections = off
log_lock_waits = on

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 10MB
