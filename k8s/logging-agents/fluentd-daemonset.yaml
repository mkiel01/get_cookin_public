apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: logging
  labels:
    app: fluentd
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      serviceAccountName: fluentd
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: fluentd
          image: fluent/fluentd-kubernetes-daemonset:v1.16-debian-elasticsearch8-2
          env:
            - name: FLUENT_CONTAINER_TAIL_EXCLUDE_PATH
              value: "/var/log/containers/fluentd*"
            - name: FLUENT_ES_HOST
              valueFrom:
                configMapKeyRef:
                  name: fluentd-env
                  key: FLUENT_ES_HOST
            - name: FLUENT_ES_PORT
              valueFrom:
                configMapKeyRef:
                  name: fluentd-env
                  key: FLUENT_ES_PORT
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              memory: 512Mi
              cpu: "1"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: fluentd-pos
              mountPath: /var/log/fluentd-pos
            - name: fluentd-bufs
              mountPath: /var/log/fluentd-bufs
            - name: config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: fluentd-pos
          emptyDir: {}
        - name: fluentd-bufs
          emptyDir: {}
        - name: config
          configMap:
            name: fluentd-config
