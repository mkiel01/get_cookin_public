# Overrides for prometheus-community/kube-prometheus-stack on single-node kind.
# Grafana ships with default Kubernetes dashboards (CPU, memory, nodes, pods, etc.).
#
# Install: see k8s/README.md — Optional: Prometheus + Grafana

defaultRules:
  create: true
  rules:
    # kind often has no reachable control-plane components from the data plane
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # adminUser / adminPassword: pass at helm install with --set (see k8s/README.md)
  # Use Grafana for dashboards only; Alertmanager still runs alerts for Prometheus.
  # Disable Grafana’s own Alerting UI so the left nav isn’t a second alerting system.
  grafana.ini:
    unified_alerting:
      enabled: false

prometheus:
  prometheusSpec:
    retention: 3d
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 200m
        memory: 768Mi
      limits:
        memory: 2Gi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Custom alerts for namespace get-cookin (pods, PVCs, CPU/memory vs limits, volume usage).
# Notifications: configure Alertmanager receivers (Slack/email) — see k8s/monitoring-alerts/README.md
additionalPrometheusRulesMap:
  get-cookin-rules:
    groups:
      - name: get-cookin
        rules:
          - alert: GetCookinDeploymentUnavailableReplicas
            expr: kube_deployment_spec_replicas{namespace="get-cookin"} - kube_deployment_status_replicas_available{namespace="get-cookin"} > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Deployment in get-cookin has unavailable replicas
              description: >
                Deployment {{ $labels.deployment }} is missing replicas
                (spec minus available > 0 for 5m).

          - alert: GetCookinPVCPending
            expr: kube_persistentvolumeclaim_status_phase{namespace="get-cookin",phase="Pending"} == 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: PVC Pending in get-cookin
              description: PVC {{ $labels.persistentvolumeclaim }} is Pending (bind/storage issue).

          - alert: GetCookinPVCVolumeAlmostFull
            expr: |
              (
                kubelet_volume_stats_used_bytes{namespace="get-cookin"}
                /
                kubelet_volume_stats_capacity_bytes{namespace="get-cookin"}
              ) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: PVC volume over 80% full (get-cookin)
              description: PVC {{ $labels.persistentvolumeclaim }} is over 80% used.

          - alert: GetCookinContainerCPUHighVsLimit
            expr: |
              (
                sum by (namespace, pod, container) (
                  rate(container_cpu_usage_seconds_total{namespace="get-cookin",container!="POD",container!=""}[5m])
                )
                /
                sum by (namespace, pod, container) (
                  kube_pod_container_resource_limits{namespace="get-cookin",resource="cpu"}
                )
              ) > 0.8
              and on (namespace, pod, container)
              kube_pod_container_resource_limits{namespace="get-cookin",resource="cpu"} > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Container CPU over 80% of its limit (get-cookin)
              description: >
                Pod {{ $labels.pod }} container {{ $labels.container }} is using >80% of its CPU limit.
                Fires only when a CPU limit is set.

          - alert: GetCookinContainerMemoryHighVsLimit
            expr: |
              (
                sum by (namespace, pod, container) (container_memory_working_set_bytes{namespace="get-cookin",container!="POD",container!=""})
                /
                sum by (namespace, pod, container) (kube_pod_container_resource_limits{namespace="get-cookin",resource="memory"})
              ) > 0.8
              and on (namespace, pod, container)
              kube_pod_container_resource_limits{namespace="get-cookin",resource="memory"} > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Container memory over 80% of its limit (get-cookin)
              description: >
                Pod {{ $labels.pod }} container {{ $labels.container }} is using >80% of its memory limit.

          # Single-node kind — warn when root filesystem is over 80% full (host disk).
          - alert: NodeFilesystemAlmostFull
            expr: |
              (
                1 -
                (
                  node_filesystem_avail_bytes{fstype!="",fstype!="tmpfs",mountpoint="/"}
                  /
                  node_filesystem_size_bytes{fstype!="",fstype!="tmpfs",mountpoint="/"}
                )
              ) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Node root filesystem over 80% full
              description: Instance {{ $labels.instance }} mount {{ $labels.mountpoint }} is over 80% used.
